name: macOS Native Tests

on:
  push:
    branches: [main, cobuild]
  pull_request:
    branches: [main, cobuild]

jobs:
  native-tests:
    name: AppleScript Lint
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint AppleScript files
        run: npm run lint:applescript

  smoke-test:
    name: Package Smoke Test
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build native modules
        run: npm run build:native

      - name: Build popup
        run: npm run build:popup

      - name: Package application
        run: npm run package
        env:
          CLOUDFRONT_DOMAIN: ${{ vars.CLOUDFRONT_DOMAIN }}

      - name: Smoke test packaged app
        run: bash scripts/smoke-test.sh

  cobuild-smoke-test:
    name: Cobuild Smoke Test
    if: github.base_ref == 'cobuild' || github.ref == 'refs/heads/cobuild'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build native modules
        run: npm run build:native

      - name: Build cobuilding Rust binary
        run: npm run build:cobuilding:rust

      - name: Build popup
        run: npm run build:popup

      - name: Package cobuild application
        run: npm run package
        env:
          ENTRY_POINT: cobuilding
          CLOUDFRONT_DOMAIN: ${{ vars.CLOUDFRONT_DOMAIN }}

      - name: Smoke test cobuild app
        run: bash scripts/smoke-test-cobuild.sh
