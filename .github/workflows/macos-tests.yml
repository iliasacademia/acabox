name: macOS Native Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native-tests:
    name: AppleScript Lint
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint AppleScript files
        run: npm run lint:applescript
