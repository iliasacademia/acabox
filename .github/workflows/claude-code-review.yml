name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip for WIP PRs, PRs with skip-claude label, or WIP branches
    if: |
      !contains(github.event.pull_request.title, '[WIP]') &&
      !contains(github.event.pull_request.title, '[wip]') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-claude') &&
      !startsWith(github.event.pull_request.head.ref, 'wip-')

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check if author is blacklisted
        id: blacklist-check
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          echo "PR Author: $PR_AUTHOR"

          if [ ! -f .github/claude-review-blacklist.json ]; then
            echo "No blacklist file found, proceeding with review"
            echo "blacklisted=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          BLACKLISTED=$(jq -r --arg author "$PR_AUTHOR" \
            '.blacklisted_authors | contains([$author])' \
            .github/claude-review-blacklist.json)

          echo "Blacklisted: $BLACKLISTED"
          echo "blacklisted=$BLACKLISTED" >> $GITHUB_OUTPUT

          if [ "$BLACKLISTED" = "true" ]; then
            echo "Author is blacklisted, skipping review"
          fi

      - name: Setup Node.js
        if: steps.blacklist-check.outputs.blacklisted != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        if: steps.blacklist-check.outputs.blacklisted != 'true'
        run: npm ci

      - name: Analyze PR size
        if: steps.blacklist-check.outputs.blacklisted != 'true'
        id: pr-size
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED_FILES=$(git diff --name-only $BASE_SHA...$HEAD_SHA | wc -l)
          CHANGED_LINES=$(git diff --stat $BASE_SHA...$HEAD_SHA | tail -n 1 | awk '{print $4}')

          echo "Changed files: $CHANGED_FILES"
          echo "Changed lines: $CHANGED_LINES"
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "changed_lines=$CHANGED_LINES" >> $GITHUB_OUTPUT

          # Large PR threshold: >20 files OR >500 lines
          if [ "$CHANGED_FILES" -gt 20 ] || [ "$CHANGED_LINES" -gt 500 ]; then
            echo "large_pr=true" >> $GITHUB_OUTPUT
            echo "This is a large PR"
          else
            echo "large_pr=false" >> $GITHUB_OUTPUT
            echo "This is a standard-sized PR"
          fi

      - name: Run Claude Code Review
        if: steps.blacklist-check.outputs.blacklisted != 'true'
        uses: anthropics/claude-code-action@beta
        timeout-minutes: 30
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: |
            Task(general-purpose),
            Read,
            Grep,
            Glob,
            Bash(npm run typecheck),
            Bash(npm test),
            Bash(git diff --name-only),
            Bash(git diff --stat),
            Bash(git log --oneline),
            WebFetch(domain:docs.electronjs.org),
            WebFetch(domain:react.dev),
            WebFetch(domain:reactjs.org),
            WebFetch(domain:typescriptlang.org),
            WebFetch(domain:jestjs.io),
            WebFetch(domain:webpack.js.org),
            WebFetch(domain:nodejs.org),
            WebFetch(domain:developer.mozilla.org),
            WebFetch(domain:owasp.org)
          direct_prompt: |
            You are reviewing a pull request for an Electron desktop application built with TypeScript and React 19.

            ## PR SIZE
            This PR has ${{ steps.pr-size.outputs.changed_files }} changed files with approximately ${{ steps.pr-size.outputs.changed_lines }} lines changed.

            ## SCOPE
            Review the ENTIRE pull request - examine all changed files, additions, deletions, and modifications. Do not skip any files.

            ## REVIEW PROCESS
            1. Get an overview of all changed files in this PR
            2. Review each file thoroughly for the focus areas below
            3. Consider relationships between changes across different files
            4. Provide feedback that covers the complete scope of the PR

            ## STRATEGY
            ${{ steps.pr-size.outputs.large_pr == 'true' && 'LARGE PR DETECTED: Use the Task tool to systematically review this PR in logical chunks (e.g., main process changes, renderer process changes, IPC updates, UI components, tests, configuration). This ensures thorough coverage without missing files.' || 'Standard PR: Conduct a single-pass comprehensive review of all changes.' }}

            ## PRIORITY SYSTEM
            Each issue you identify must have a priority level:
            - **CRITICAL**: Security vulnerabilities, data loss risks, breaking changes, severe bugs
            - **HIGH**: Major bugs, significant performance issues, important architectural concerns
            - **MEDIUM**: Code quality issues, moderate inefficiencies, maintainability concerns
            - **LOW**: Minor style issues, small optimizations, suggestions

            **Only surface CRITICAL and HIGH priority issues in your review.** Track MEDIUM/LOW issues internally but don't include them in your final output.

            ## FOCUS AREAS (in priority order)

            ### 1. Security Vulnerabilities
            - XSS, SQL injection, command injection, path traversal attacks
            - Insecure IPC communication between main and renderer processes
            - Node integration security risks
            - Context isolation violations
            - Unsafe use of remote module or dangerous Electron APIs
            - Exposure of sensitive data or credentials
            - Dependency vulnerabilities

            ### 2. Electron-Specific Patterns
            - Proper context isolation and preload script usage
            - Secure IPC (ipcMain/ipcRenderer) communication patterns
            - Main vs renderer process concerns and boundaries
            - Proper use of Electron APIs (BrowserWindow, session, protocol, etc.)
            - Security best practices (CSP, sandboxing, disabling Node integration)
            - Native module integration and node-gyp builds
            - Window management and lifecycle

            ### 3. React Best Practices
            - Proper hooks usage (useEffect, useMemo, useCallback, etc.)
            - Component design patterns and composition
            - State management and data flow
            - Performance concerns (unnecessary re-renders, expensive computations)
            - React 19 specific features and best practices
            - Event handler management and cleanup
            - Accessibility considerations

            ## OUTPUT FORMAT
            For each issue found, use this format:

            ```
            **[PRIORITY]** Issue Title

            Location: file_path:line_number

            Description: Clear explanation of the issue

            Impact: What could go wrong

            Recommendation: Specific fix or improvement
            ```

            ## REMEMBER
            - Focus ONLY on CRITICAL and HIGH priority issues
            - Be specific with file paths and line numbers
            - Provide actionable recommendations
            - Consider the Electron security model in all assessments
            - If you find no CRITICAL or HIGH issues, briefly acknowledge the review and note that the code looks good
