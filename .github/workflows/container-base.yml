name: Build & Push Cobuilding Base Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR (uncheck to build-only test)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: container-base-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: academia-edu/cobuilding-base

jobs:
  build-and-push:
    name: Build & Push Base Image
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tag variables
        id: vars
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "branch_tag=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: src/cobuilding
          file: src/cobuilding/Dockerfile.base
          push: ${{ inputs.push }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.branch_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.description=Cobuild Base Image
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # arm64 disabled: QEMU emulation causes R package load failures.
          # Re-enable with a native arm64 runner when needed.
          platforms: linux/amd64
