name: Build & Push Cobuilding Base Image

on:
  push:
    branches: [cobuild]
    paths:
      - 'src/cobuilding/Dockerfile.base'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR (uncheck to build-only test)'
        required: false
        default: true
        type: boolean
      no_cache:
        description: 'Skip Docker cache (force full rebuild)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

concurrency:
  group: container-base-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: academia-edu/cobuilding-base

jobs:
  build-and-push:
    name: Build & Push Base Image
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Generate tag variables
        id: vars
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "branch_tag=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Resolve cache settings
        id: cache
        run: |
          echo "=== Debug: raw input values ==="
          echo "inputs.no_cache=${{ inputs.no_cache }}"
          echo "github.event.inputs.no_cache=${{ github.event.inputs.no_cache }}"
          if [ "${{ inputs.no_cache }}" = "true" ]; then
            echo "no_cache=true" >> $GITHUB_OUTPUT
            echo "cache_from=" >> $GITHUB_OUTPUT
            echo ">>> Cache DISABLED: full rebuild forced"
          else
            echo "no_cache=false" >> $GITHUB_OUTPUT
            echo "cache_from=type=gha" >> $GITHUB_OUTPUT
            echo ">>> Cache ENABLED: using GHA cache"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        env:
          # Prevent buildx from auto-injecting org.opencontainers.image.source
          # (and .revision/.url) from the git context. That label is what makes
          # GHCR render this repo's README on the public package page.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: ""
          BUILDX_GIT_LABELS: "false"
          BUILDX_GIT_INFO: "false"
        with:
          context: src/cobuilding
          file: src/cobuilding/Dockerfile.base
          push: ${{ inputs.push == '' && true || inputs.push }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.branch_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.description=Cobuilding Base Image
            org.opencontainers.image.source=https://ghcr.io/academia-edu/cobuilding-base
          provenance: false
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          no-cache: ${{ steps.cache.outputs.no_cache }}

  save-and-upload-tar:
    name: Save & Upload ${{ matrix.arch }} Tar
    needs: build-and-push
    if: ${{ inputs.push == '' || inputs.push == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
        include:
          - arch: arm64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Pull arch-specific image
        run: |
          docker pull --platform ${{ matrix.platform }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Save and compress image tar
        id: compress
        run: |
          FILENAME="cobuilding-base-${{ matrix.arch }}.tar"

          echo "Saving image to tar..."
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -o "${FILENAME}"
          TAR_SIZE=$(du -h "${FILENAME}" | cut -f1)
          echo "Tar size: ${TAR_SIZE}"

          echo "Compressing with zstd..."
          sudo apt-get install -y zstd
          zstd -3 -T0 "${FILENAME}" -o "${FILENAME}.zst"
          ZST_SIZE=$(du -h "${FILENAME}.zst" | cut -f1)
          echo "Compressed size: ${ZST_SIZE}"

          CHECKSUM=$(sha256sum "${FILENAME}.zst" | cut -d' ' -f1)
          echo "Checksum: ${CHECKSUM}"

          SIZE_BYTES=$(stat --format=%s "${FILENAME}.zst")
          echo "Size bytes: ${SIZE_BYTES}"

          echo "checksum=${CHECKSUM}" >> $GITHUB_OUTPUT
          echo "size=${SIZE_BYTES}" >> $GITHUB_OUTPUT
          echo "filename=${FILENAME}.zst" >> $GITHUB_OUTPUT

          rm "${FILENAME}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          BUCKET="${{ vars.S3_BUCKET_NAME }}"
          FILENAME="${{ steps.compress.outputs.filename }}"

          echo "Uploading ${FILENAME} to s3://${BUCKET}/cobuilding-images/full/"
          aws s3 cp "${FILENAME}" "s3://${BUCKET}/cobuilding-images/full/${FILENAME}"
          echo "Upload complete"

      - name: Save metadata
        run: |
          echo '${{ steps.compress.outputs.checksum }}' > checksum-${{ matrix.arch }}.txt
          echo '${{ steps.compress.outputs.size }}' > size-${{ matrix.arch }}.txt

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-metadata-${{ matrix.arch }}
          path: |
            checksum-${{ matrix.arch }}.txt
            size-${{ matrix.arch }}.txt

  update-manifest:
    name: Update Image Manifest
    needs: save-and-upload-tar
    runs-on: ubuntu-latest

    steps:
      - name: Download metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: full-metadata-*
          merge-multiple: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update manifest.json
        run: |
          BUCKET="${{ vars.S3_BUCKET_NAME }}"
          VERSION=$(echo "${{ github.sha }}" | cut -c1-7)

          ARM64_CHECKSUM=$(cat checksum-arm64.txt)
          ARM64_SIZE=$(cat size-arm64.txt)
          AMD64_CHECKSUM=$(cat checksum-amd64.txt)
          AMD64_SIZE=$(cat size-amd64.txt)

          # Download existing manifest or create empty one
          aws s3 cp "s3://${BUCKET}/cobuilding-images/manifest.json" manifest.json 2>/dev/null || echo '{}' > manifest.json

          # Merge full entry (preserves existing core entry)
          jq --arg version "$VERSION" \
             --arg arm64_url "full/cobuilding-base-arm64.tar.zst" \
             --arg arm64_size "$ARM64_SIZE" \
             --arg arm64_checksum "sha256:${ARM64_CHECKSUM}" \
             --arg amd64_url "full/cobuilding-base-amd64.tar.zst" \
             --arg amd64_size "$AMD64_SIZE" \
             --arg amd64_checksum "sha256:${AMD64_CHECKSUM}" \
             '.full = {
               version: $version,
               arm64: { url: $arm64_url, size: ($arm64_size | tonumber), checksum: $arm64_checksum },
               amd64: { url: $amd64_url, size: ($amd64_size | tonumber), checksum: $amd64_checksum }
             }' manifest.json > manifest-updated.json

          mv manifest-updated.json manifest.json
          echo "Updated manifest.json:"
          cat manifest.json

          aws s3 cp manifest.json "s3://${BUCKET}/cobuilding-images/manifest.json"

      - name: Invalidate CloudFront cache
        continue-on-error: true
        run: |
          DISTRIBUTION_ID="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --invalidation-batch "{\"Paths\":{\"Quantity\":2,\"Items\":[\"/cobuilding-images/full/*\",\"/cobuilding-images/manifest.json\"]},\"CallerReference\":\"full-$(date +%s)\"}"
          echo "CloudFront cache invalidation initiated"
