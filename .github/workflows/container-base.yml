name: Build & Push Cobuilding Base Image

on:
  push:
    branches: [cobuild]
    paths:
      - 'src/cobuilding/Dockerfile.base'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR (uncheck to build-only test)'
        required: false
        default: true
        type: boolean
      no_cache:
        description: 'Skip Docker cache (force full rebuild)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: container-base-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: academia-edu/cobuilding-base

jobs:
  build-and-push:
    name: Build & Push Base Image
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Generate tag variables
        id: vars
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "branch_tag=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Resolve cache settings
        id: cache
        run: |
          echo "=== Debug: raw input values ==="
          echo "inputs.no_cache=${{ inputs.no_cache }}"
          echo "github.event.inputs.no_cache=${{ github.event.inputs.no_cache }}"
          if [ "${{ inputs.no_cache }}" = "true" ]; then
            echo "no_cache=true" >> $GITHUB_OUTPUT
            echo "cache_from=" >> $GITHUB_OUTPUT
            echo ">>> Cache DISABLED: full rebuild forced"
          else
            echo "no_cache=false" >> $GITHUB_OUTPUT
            echo "cache_from=type=gha" >> $GITHUB_OUTPUT
            echo ">>> Cache ENABLED: using GHA cache"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        env:
          # Prevent buildx from auto-injecting org.opencontainers.image.source
          # (and .revision/.url) from the git context. That label is what makes
          # GHCR render this repo's README on the public package page.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: ""
          BUILDX_GIT_LABELS: "false"
          BUILDX_GIT_INFO: "false"
        with:
          context: src/cobuilding
          file: src/cobuilding/Dockerfile.base
          push: ${{ inputs.push }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.branch_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.description=Cobuilding Base Image
          provenance: false
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          no-cache: ${{ steps.cache.outputs.no_cache }}
