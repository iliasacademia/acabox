name: Build & Package

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
      timestamp_readable: ${{ steps.version.outputs.timestamp_readable }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate semantic version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMP_TYPE: ${{ inputs.bump_type || 'patch' }}
        run: |
          set -e

          # Generate timestamp for artifact naming
          TIMESTAMP_READABLE=$(date -u +"%Y%m%d-%H%M")
          echo "timestamp_readable=${TIMESTAMP_READABLE}" >> $GITHUB_OUTPUT

          # Handle tag releases - use exact version from tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "channel=stable" >> $GITHUB_OUTPUT
            echo "Tag release: using version ${VERSION}"
            exit 0
          fi

          # Determine channel based on branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            CHANNEL="stable"
          else
            CHANNEL="beta"
          fi

          # Fetch latest stable release version (non-prerelease)
          LATEST_STABLE=$(gh release list --exclude-pre-releases --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          echo "Latest stable release: ${LATEST_STABLE:-none}"

          # Default starting version (will become 0.2.0 after first increment)
          if [ -z "$LATEST_STABLE" ]; then
            echo "No prior releases found, using default base version"
            MAJOR=0; MINOR=1; PATCH=0
          else
            LATEST_STABLE="${LATEST_STABLE#v}"
            # Parse version - handle old timestamp format by checking if patch > 999999
            if [[ "$LATEST_STABLE" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              # If patch is timestamp-like (>999999), treat as legacy and use default
              if [ "$PATCH" -gt 999999 ]; then
                echo "Detected legacy timestamp version, using default base version"
                MAJOR=0; MINOR=1; PATCH=0
              fi
            else
              echo "Could not parse version, using default base version"
              MAJOR=0; MINOR=1; PATCH=0
            fi
          fi

          echo "Current version base: ${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump type: ${BUMP_TYPE}"

          if [ "$CHANNEL" == "stable" ]; then
            # Increment based on bump type
            case "$BUMP_TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          else
            # Beta: calculate what the next stable version would be
            case "$BUMP_TYPE" in
              major) NEXT_MAJOR=$((MAJOR + 1)); NEXT_MINOR=0; NEXT_PATCH=0 ;;
              minor) NEXT_MAJOR=$MAJOR; NEXT_MINOR=$((MINOR + 1)); NEXT_PATCH=0 ;;
              patch) NEXT_MAJOR=$MAJOR; NEXT_MINOR=$MINOR; NEXT_PATCH=$((PATCH + 1)) ;;
            esac
            BASE_VERSION="${NEXT_MAJOR}.${NEXT_MINOR}.${NEXT_PATCH}"

            # Find existing beta releases for this base version
            echo "Checking for existing beta releases of ${BASE_VERSION}..."
            BETA_RELEASES=$(gh release list --limit 100 --json tagName -q ".[].tagName" 2>/dev/null | grep "^${BASE_VERSION}-beta\." || echo "")

            if [ -z "$BETA_RELEASES" ]; then
              BETA_NUM=1
            else
              echo "Found existing beta releases: ${BETA_RELEASES}"
              MAX_BETA=$(echo "$BETA_RELEASES" | sed 's/.*-beta\.//' | sort -n | tail -1)
              BETA_NUM=$((MAX_BETA + 1))
            fi

            VERSION="${BASE_VERSION}-beta.${BETA_NUM}"
          fi

          echo "Calculated version: ${VERSION} (channel: ${CHANNEL})"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

  package:
    needs: calculate-version
    name: Package Electron App (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_pattern: "out/make/**/*.{dmg,zip}"
            node-version: 22.x
          - os: windows-latest
            platform: win32
            arch: x64
            artifact_pattern: "out/make/**/*.{exe,nupkg}"
            node-version: 22.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate input for command injection
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Reject branch names with potentially dangerous characters
          if echo "$REF_NAME" | grep -qE '[;`$()]'; then
            echo "Error: Branch/tag name contains potentially dangerous characters: $REF_NAME"
            echo "Rejected characters: ; \` $ ( )"
            exit 1
          fi
          echo "Input validation passed for: $REF_NAME"

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build native modules
        if: matrix.platform == 'darwin'
        run: npm run build:native

      - name: Skip native modules (Windows)
        if: matrix.platform == 'win32'
        run: echo "Skipping native module build on Windows - Word integration disabled"

      - name: Build popup
        run: npm run build:popup

      - name: Setup code signing certificate (macOS)
        if: matrix.platform == 'darwin'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create and unlock keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Enable codesigning from the new keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed s/\"//g)

          # Clean up certificate file
          rm certificate.p12

          # Store keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Setup code signing certificate (Windows)
        if: matrix.platform == 'win32'
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$WINDOWS_CERTIFICATE" | base64 --decode > certificate.pfx
          echo "WINDOWS_CERTIFICATE_FILE=$PWD/certificate.pfx" >> $GITHUB_ENV
          echo "WINDOWS_CERTIFICATE_PASSWORD=$WINDOWS_CERTIFICATE_PASSWORD" >> $GITHUB_ENV

      - name: Generate version and artifact name
        id: artifact-name
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.calculate-version.outputs.version }}
          CHANNEL: ${{ needs.calculate-version.outputs.channel }}
          TIMESTAMP_READABLE: ${{ needs.calculate-version.outputs.timestamp_readable }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          # Update package.json with the calculated version
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Updated package.json to version: $VERSION"

          # Generate artifact name (descriptive, includes branch and timestamp)
          BRANCH_NAME=$(echo "$REF_NAME" | sed 's/[\/\.]/-/g' | tr '[:upper:]' '[:lower:]')
          BRANCH_NAME_SHORT=$(echo "$BRANCH_NAME" | cut -c1-40)

          # Platform-specific artifact naming
          if [[ "$PLATFORM" == "darwin" ]]; then
            ARTIFACT_NAME="academia-electron-macos-${BRANCH_NAME_SHORT}-${TIMESTAMP_READABLE}"
          else
            ARTIFACT_NAME="academia-electron-windows-${BRANCH_NAME_SHORT}-${TIMESTAMP_READABLE}"
          fi

          # Output for use in subsequent steps
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT
          echo "arch=${{ matrix.arch }}" >> $GITHUB_OUTPUT

      - name: Package application
        run: npm run make
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          CLOUDFRONT_DOMAIN: ${{ vars.CLOUDFRONT_DOMAIN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Debug - List output files
        shell: bash
        run: |
          echo "Listing out/make directory structure:"
          find out/make -type f || true
          ls -R out/make || true

      - name: Generate update manifest
        shell: bash
        env:
          VERSION: ${{ steps.artifact-name.outputs.version }}
          CHANNEL: ${{ steps.artifact-name.outputs.channel }}
          PLATFORM: ${{ steps.artifact-name.outputs.platform }}
          ARCH: ${{ steps.artifact-name.outputs.arch }}
        run: |
          node scripts/generate-update-manifest.js "$VERSION" "$CHANNEL" "$ARCH" "$PLATFORM"

      - name: Install js-yaml for manifest modification
        run: npm install --no-save js-yaml

      - name: Upload to S3
        shell: bash
        run: |
          VERSION="${{ steps.artifact-name.outputs.version }}"
          CHANNEL="${{ steps.artifact-name.outputs.channel }}"
          PLATFORM="${{ steps.artifact-name.outputs.platform }}"
          ARCH="${{ steps.artifact-name.outputs.arch }}"
          BUCKET="${{ vars.S3_BUCKET_NAME }}"
          CLOUDFRONT_DOMAIN="${{ vars.CLOUDFRONT_DOMAIN }}"

          echo "Uploading to S3: s3://${BUCKET}/${CHANNEL}/${VERSION}/"

          if [[ "$PLATFORM" == "darwin" ]]; then
            # macOS: .zip (auto-updater) and .dmg (manual)
            aws s3 cp out/make/zip/darwin/${ARCH}/ \
              s3://${BUCKET}/${CHANNEL}/${VERSION}/ \
              --recursive \
              --exclude "*" \
              --include "*.zip" \
              --include "*.blockmap"

            if [ -d "out/make/dmg/darwin/${ARCH}/" ]; then
              aws s3 cp out/make/dmg/darwin/${ARCH}/ \
                s3://${BUCKET}/${CHANNEL}/${VERSION}/ \
                --recursive \
                --include "*.dmg"
            fi

            MANIFEST_FILE="out/make/zip/darwin/${ARCH}/${CHANNEL}-mac.yml"
            MANIFEST_S3_NAME="${CHANNEL}-mac.yml"
          else
            # Windows: Squirrel installer files
            aws s3 cp out/make/squirrel.windows/${ARCH}/ \
              s3://${BUCKET}/${CHANNEL}/${VERSION}/ \
              --recursive \
              --include "*.exe" \
              --include "*.nupkg" \
              --include "RELEASES"

            MANIFEST_FILE="out/make/squirrel.windows/${ARCH}/${CHANNEL}.yml"
            MANIFEST_S3_NAME="${CHANNEL}.yml"
          fi

          # Update manifest with CloudFront URLs
          if [ -f "$MANIFEST_FILE" ]; then
            echo "Updating manifest URLs to use CloudFront with versioned paths..."

            # Use Node.js to safely modify YAML manifest
            export MANIFEST_FILE
            export CLOUDFRONT_DOMAIN
            export CHANNEL
            export VERSION
            node scripts/update-manifest.js

            # Upload manifest to channel root with platform-specific name
            aws s3 cp "$MANIFEST_FILE" s3://${BUCKET}/${CHANNEL}/${MANIFEST_S3_NAME}

            echo "Upload complete!"
            echo "Artifacts location: s3://${BUCKET}/${CHANNEL}/${VERSION}/"
            echo "Manifest location: s3://${BUCKET}/${CHANNEL}/${MANIFEST_S3_NAME}"
          else
            echo "Warning: Manifest file not found at $MANIFEST_FILE"
            exit 1
          fi

      - name: Invalidate CloudFront cache
        shell: bash
        continue-on-error: true
        run: |
          CHANNEL="${{ steps.artifact-name.outputs.channel }}"
          PLATFORM="${{ steps.artifact-name.outputs.platform }}"
          DISTRIBUTION_ID="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"

          if [[ "$PLATFORM" == "darwin" ]]; then
            MANIFEST_PATH="/${CHANNEL}/${CHANNEL}-mac.yml"
          else
            MANIFEST_PATH="/${CHANNEL}/${CHANNEL}.yml"
          fi

          echo "Invalidating CloudFront cache for ${MANIFEST_PATH}..."

          # Use JSON input to avoid shell escaping issues on Windows
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --invalidation-batch "{\"Paths\":{\"Quantity\":1,\"Items\":[\"${MANIFEST_PATH}\"]},\"CallerReference\":\"$(date +%s)\"}"

          echo "CloudFront cache invalidation initiated"

      - name: Cleanup keychain (macOS)
        if: matrix.platform == 'darwin' && always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Cleanup certificate (Windows)
        if: matrix.platform == 'win32' && always()
        shell: bash
        run: |
          if [ -f "certificate.pfx" ]; then
            rm certificate.pfx
          fi

      - name: Create Pre-Release (Feature Branches)
        if: "!startsWith(github.ref, 'refs/tags/v') && github.ref != 'refs/heads/main' && github.event_name == 'workflow_dispatch'"
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
          tag_name: ${{ steps.artifact-name.outputs.version }}
          name: "Beta v${{ steps.artifact-name.outputs.version }}"
          body: |
            Beta release from branch `${{ github.ref_name }}`

            **Build Information:**
            - Version: ${{ steps.artifact-name.outputs.version }}
            - Channel: ${{ steps.artifact-name.outputs.channel }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}

            This is a beta build for testing purposes.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Main Branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
          tag_name: ${{ steps.artifact-name.outputs.version }}
          name: "v${{ steps.artifact-name.outputs.version }}"
          body: |
            Release from `main` branch

            **Build Information:**
            - Version: ${{ steps.artifact-name.outputs.version }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Version Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
