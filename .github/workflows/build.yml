name: Build & Package

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package Electron App
    runs-on: macos-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build native modules
        run: npm run build:native

      - name: Build popup
        run: npm run build:popup

      - name: Setup code signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create and unlock keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Enable codesigning from the new keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed s/\"//g)

          # Clean up certificate file
          rm certificate.p12

          # Store keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Generate version and artifact name
        id: artifact-name
        run: |
          # Generate timestamp version in format: YYYYMMDDHHMMSS (14 digits)
          VERSION_TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")

          # Determine version based on branch/tag
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Main branch = stable with timestamp
            VERSION="${VERSION_TIMESTAMP}"
            CHANNEL="stable"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Version tags use the tag as-is
            VERSION="${{ github.ref_name }}"
            CHANNEL="stable"
          else
            # Feature branches = beta channel with timestamp
            VERSION="${VERSION_TIMESTAMP}-beta"
            CHANNEL="beta"
          fi

          # Update package.json with the generated version
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Updated package.json to version: $VERSION"

          # Generate artifact name (descriptive, includes branch and timestamp)
          TIMESTAMP_READABLE=$(date -u +"%Y%m%d-%H%M%S")
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[\/\.]/-/g' | tr '[:upper:]' '[:lower:]')
          BRANCH_NAME_SHORT=$(echo "$BRANCH_NAME" | cut -c1-40)
          ARTIFACT_NAME="academia-electron-macos-${BRANCH_NAME_SHORT}-${TIMESTAMP_READABLE}"

          # Output for use in subsequent steps
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

      - name: Package application
        run: npm run make
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Create Pre-Release (Feature Branches)
        if: "!startsWith(github.ref, 'refs/tags/v') && github.ref != 'refs/heads/main'"
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
          tag_name: ${{ steps.artifact-name.outputs.version }}
          name: "Pre-release: ${{ github.ref_name }} (v${{ steps.artifact-name.outputs.version }})"
          body: |
            Pre-release build from branch `${{ github.ref_name }}`

            **Build Information:**
            - Version: ${{ steps.artifact-name.outputs.version }}
            - Channel: ${{ steps.artifact-name.outputs.channel }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Build Date: ${{ github.event.head_commit.timestamp }}

            This is an automated pre-release build for testing purposes.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Main Branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
          tag_name: ${{ steps.artifact-name.outputs.version }}
          name: "Release v${{ steps.artifact-name.outputs.version }}"
          body: |
            Production release from `main` branch

            **Build Information:**
            - Version: ${{ steps.artifact-name.outputs.version }}
            - Channel: ${{ steps.artifact-name.outputs.channel }}
            - Commit: ${{ github.sha }}
            - Build Date: ${{ github.event.head_commit.timestamp }}

            This is an automated release build from the main branch.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Version Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
