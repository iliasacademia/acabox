name: Build & Package

on:
  workflow_dispatch:
    inputs:
      major:
        description: 'Major version number'
        required: false
        default: ''
        type: string
      minor:
        description: 'Minor version number'
        required: false
        default: ''
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package Electron App
    runs-on: macos-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build native modules
        run: npm run build:native

      - name: Build popup
        run: npm run build:popup

      - name: Setup code signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create and unlock keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Enable codesigning from the new keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed s/\"//g)

          # Clean up certificate file
          rm certificate.p12

          # Store keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Generate version and artifact name
        id: artifact-name
        run: |
          # Determine version based on branch/tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Version tags use the tag as-is (remove v prefix if present)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            CHANNEL="stable"
          else
            # Get current major.minor from package.json
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            CURRENT_MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            CURRENT_MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)

            # Use workflow inputs if provided, otherwise use current values
            MAJOR="${{ inputs.major }}"
            MINOR="${{ inputs.minor }}"

            if [[ -z "$MAJOR" ]]; then
              MAJOR="$CURRENT_MAJOR"
            fi

            if [[ -z "$MINOR" ]]; then
              MINOR="$CURRENT_MINOR"
            fi

            # Generate timestamp as patch: YYYYMMDDHHMMSS
            PATCH=$(date -u +"%Y%m%d%H%M%S")

            # Build version: MAJOR.MINOR.PATCH
            VERSION="${MAJOR}.${MINOR}.${PATCH}"

            # Determine channel and add suffix for feature branches
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              CHANNEL="stable"
            else
              CHANNEL="beta"
              VERSION="${VERSION}-beta"
            fi
          fi

          # Update package.json with the generated version
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Updated package.json to version: $VERSION"

          # Generate artifact name (descriptive, includes branch and timestamp)
          TIMESTAMP_READABLE=$(date -u +"%Y%m%d-%H%M%S")
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[\/\.]/-/g' | tr '[:upper:]' '[:lower:]')
          BRANCH_NAME_SHORT=$(echo "$BRANCH_NAME" | cut -c1-40)
          ARTIFACT_NAME="academia-electron-macos-${BRANCH_NAME_SHORT}-${TIMESTAMP_READABLE}"

          # Output for use in subsequent steps
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

      - name: Package application
        run: npm run make
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          VERSION="${{ steps.artifact-name.outputs.version }}"
          CHANNEL="${{ steps.artifact-name.outputs.channel }}"
          BUCKET="${{ secrets.S3_BUCKET_NAME }}"

          # TODO: Replace 'REPLACE-WITH-CLOUDFRONT-DOMAIN' with actual CloudFront domain
          CLOUDFRONT_DOMAIN="REPLACE-WITH-CLOUDFRONT-DOMAIN.cloudfront.net"

          echo "Uploading to S3: s3://${BUCKET}/${CHANNEL}/${VERSION}/"

          # Upload .zip file (required for auto-updater)
          aws s3 cp out/make/zip/darwin/x64/ \
            s3://${BUCKET}/${CHANNEL}/${VERSION}/ \
            --recursive \
            --exclude "*" \
            --include "*.zip" \
            --include "*.blockmap"

          # Upload .dmg file (for manual distribution)
          if [ -d "out/make/dmg/darwin/x64/" ]; then
            aws s3 cp out/make/dmg/darwin/x64/ \
              s3://${BUCKET}/${CHANNEL}/${VERSION}/ \
              --recursive \
              --include "*.dmg"
          fi

          # Modify latest-mac.yml to use CloudFront URLs with versioned paths
          MANIFEST_FILE="out/make/zip/darwin/x64/latest-mac.yml"
          if [ -f "$MANIFEST_FILE" ]; then
            echo "Updating manifest URLs to use CloudFront with versioned paths..."

            # Read the original manifest
            MANIFEST_CONTENT=$(cat "$MANIFEST_FILE")

            # Extract the filename from the manifest (assumes line like: path: Academia-darwin-x64-VERSION.zip)
            ORIGINAL_FILENAME=$(echo "$MANIFEST_CONTENT" | grep "^path:" | awk '{print $2}')

            if [ -n "$ORIGINAL_FILENAME" ]; then
              # Create versioned URL: https://DOMAIN/CHANNEL/VERSION/filename
              NEW_URL="https://${CLOUDFRONT_DOMAIN}/${CHANNEL}/${VERSION}/${ORIGINAL_FILENAME}"

              # Replace the path with full CloudFront URL
              sed -i.bak "s|^path: .*|path: ${NEW_URL}|" "$MANIFEST_FILE"

              # Also update the url field in the files array if it exists
              sed -i.bak "s|- url: .*|- url: ${NEW_URL}|" "$MANIFEST_FILE"

              echo "Updated manifest URLs to: ${NEW_URL}"
              echo "Updated manifest content:"
              cat "$MANIFEST_FILE"
            else
              echo "Warning: Could not extract filename from manifest"
            fi
          else
            echo "Warning: Manifest file not found at $MANIFEST_FILE"
          fi

          # Upload the modified manifest to channel root (overwrites previous)
          aws s3 cp "$MANIFEST_FILE" s3://${BUCKET}/${CHANNEL}/latest-mac.yml

          echo "Upload complete!"
          echo "Artifacts location: s3://${BUCKET}/${CHANNEL}/${VERSION}/"
          echo "Manifest location: s3://${BUCKET}/${CHANNEL}/latest-mac.yml"

      - name: Invalidate CloudFront cache
        run: |
          CHANNEL="${{ steps.artifact-name.outputs.channel }}"
          DISTRIBUTION_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"

          echo "Invalidating CloudFront cache for latest-mac.yml..."
          aws cloudfront create-invalidation \
            --distribution-id ${DISTRIBUTION_ID} \
            --paths "/${CHANNEL}/latest-mac.yml"

          echo "CloudFront cache invalidation initiated"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Create Pre-Release (Feature Branches)
        if: "!startsWith(github.ref, 'refs/tags/v') && github.ref != 'refs/heads/main'"
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
          tag_name: ${{ steps.artifact-name.outputs.version }}
          name: "Pre-release: ${{ github.ref_name }} (v${{ steps.artifact-name.outputs.version }})"
          body: |
            Pre-release build from branch `${{ github.ref_name }}`

            **Build Information:**
            - Version: ${{ steps.artifact-name.outputs.version }}
            - Channel: ${{ steps.artifact-name.outputs.channel }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Build Date: ${{ github.event.head_commit.timestamp }}

            This is an automated pre-release build for testing purposes.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Main Branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
          tag_name: ${{ steps.artifact-name.outputs.version }}
          name: "Release v${{ steps.artifact-name.outputs.version }}"
          body: |
            Production release from `main` branch

            **Build Information:**
            - Version: ${{ steps.artifact-name.outputs.version }}
            - Channel: ${{ steps.artifact-name.outputs.channel }}
            - Commit: ${{ github.sha }}
            - Build Date: ${{ github.event.head_commit.timestamp }}

            This is an automated release build from the main branch.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Version Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
