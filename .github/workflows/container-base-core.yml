name: Build & Upload Core Image Tar

on:
  push:
    branches: [cobuild, melvyn/image-download, melvyn/image-download-2]
    paths:
      - 'src/cobuilding/Dockerfile.base-core'
      - '.github/workflows/container-base-core.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-base-core-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: cobuilding-base-core

jobs:
  build-and-upload:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch: [arm64, amd64]
        include:
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm64
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: src/cobuilding
          file: src/cobuilding/Dockerfile.base-core
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:local
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=core-${{ matrix.arch }}
          cache-to: type=gha,scope=core-${{ matrix.arch }},mode=max

      - name: Save and compress image tar
        run: |
          FILENAME="${IMAGE_NAME}-${{ matrix.arch }}.tar"

          echo "Saving image to tar..."
          docker save ${IMAGE_NAME}:local -o "${FILENAME}"
          TAR_SIZE=$(du -h "${FILENAME}" | cut -f1)
          echo "Tar size: ${TAR_SIZE}"

          echo "Compressing with gzip..."
          gzip -1 -k "${FILENAME}"
          GZ_SIZE=$(du -h "${FILENAME}.gz" | cut -f1)
          echo "Compressed size: ${GZ_SIZE}"

          CHECKSUM=$(sha256sum "${FILENAME}.gz" | cut -d' ' -f1)
          echo "Checksum: ${CHECKSUM}"

          SIZE_BYTES=$(stat --format=%s "${FILENAME}.gz")
          echo "Size bytes: ${SIZE_BYTES}"

          echo "checksum=${CHECKSUM}" >> $GITHUB_OUTPUT
          echo "size=${SIZE_BYTES}" >> $GITHUB_OUTPUT
          echo "filename=${FILENAME}.gz" >> $GITHUB_OUTPUT

          rm "${FILENAME}"
        id: compress

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          BUCKET="${{ vars.S3_BUCKET_NAME }}"
          FILENAME="${{ steps.compress.outputs.filename }}"

          echo "Uploading ${FILENAME} to s3://${BUCKET}/cobuilding-images/core/"
          aws s3 cp "${FILENAME}" "s3://${BUCKET}/cobuilding-images/core/${FILENAME}"
          echo "Upload complete"

      - name: Save metadata
        run: |
          echo '${{ steps.compress.outputs.checksum }}' > checksum-${{ matrix.arch }}.txt
          echo '${{ steps.compress.outputs.size }}' > size-${{ matrix.arch }}.txt

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ matrix.arch }}
          path: |
            checksum-${{ matrix.arch }}.txt
            size-${{ matrix.arch }}.txt

  update-manifest:
    name: Update manifest
    needs: build-and-upload
    runs-on: ubuntu-latest

    steps:
      - name: Download metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: metadata-*
          merge-multiple: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update manifest.json
        run: |
          BUCKET="${{ vars.S3_BUCKET_NAME }}"
          VERSION=$(echo "${{ github.sha }}" | cut -c1-7)

          ARM64_CHECKSUM=$(cat checksum-arm64.txt)
          ARM64_SIZE=$(cat size-arm64.txt)
          AMD64_CHECKSUM=$(cat checksum-amd64.txt)
          AMD64_SIZE=$(cat size-amd64.txt)

          # Download existing manifest or create empty one
          aws s3 cp "s3://${BUCKET}/cobuilding-images/manifest.json" manifest.json 2>/dev/null || echo '{}' > manifest.json

          # Merge core entry using jq
          jq --arg version "$VERSION" \
             --arg arm64_url "core/${IMAGE_NAME}-arm64.tar.gz" \
             --arg arm64_size "$ARM64_SIZE" \
             --arg arm64_checksum "sha256:${ARM64_CHECKSUM}" \
             --arg amd64_url "core/${IMAGE_NAME}-amd64.tar.gz" \
             --arg amd64_size "$AMD64_SIZE" \
             --arg amd64_checksum "sha256:${AMD64_CHECKSUM}" \
             '.core = {
               version: $version,
               arm64: { url: $arm64_url, size: ($arm64_size | tonumber), checksum: $arm64_checksum },
               amd64: { url: $amd64_url, size: ($amd64_size | tonumber), checksum: $amd64_checksum }
             }' manifest.json > manifest-updated.json

          mv manifest-updated.json manifest.json
          echo "Updated manifest.json:"
          cat manifest.json

          aws s3 cp manifest.json "s3://${BUCKET}/cobuilding-images/manifest.json"

      - name: Invalidate CloudFront cache
        continue-on-error: true
        run: |
          DISTRIBUTION_ID="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --invalidation-batch "{\"Paths\":{\"Quantity\":2,\"Items\":[\"/cobuilding-images/core/*\",\"/cobuilding-images/manifest.json\"]},\"CallerReference\":\"core-$(date +%s)\"}"
          echo "CloudFront cache invalidation initiated"
