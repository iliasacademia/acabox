name: CI

on:
  push:
    branches: [main, cobuild]
  pull_request:
    branches: [main, cobuild]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate native module dependencies
        if: github.base_ref != 'cobuild' && github.ref != 'refs/heads/cobuild'
        run: node scripts/check-native-deps.js

      - name: Run TypeScript type checking
        run: ${{ (github.base_ref == 'cobuild' || github.ref == 'refs/heads/cobuild') && 'npx tsc --noEmit -p tsconfig.cobuilding.json' || 'npm run typecheck' }}

      - name: Run Jest tests
        if: github.base_ref != 'cobuild' && github.ref != 'refs/heads/cobuild'
        run: npm test

      - name: Run test coverage
        if: github.base_ref != 'cobuild' && github.ref != 'refs/heads/cobuild'
        run: npm run test:coverage

      - name: Build popup
        if: github.base_ref != 'cobuild' && github.ref != 'refs/heads/cobuild'
        run: npm run build:popup

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always() && github.base_ref != 'cobuild' && github.ref != 'refs/heads/cobuild'
        with:
          fail_ci_if_error: false
