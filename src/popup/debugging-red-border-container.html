<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
    }
    #border-container {
      box-sizing: border-box;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="border-container"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const borderColor = params.get('borderColor') || 'red';
    const borderWidth = params.get('borderWidth') || '2';
    const container = document.getElementById('border-container');
    container.style.border = `${borderWidth}px solid ${borderColor}`;
  </script>
</body>
</html>
