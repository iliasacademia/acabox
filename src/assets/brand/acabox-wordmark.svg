<?xml version="1.0"?>
<!-- ACABOX wordmark lockup: small-master mark (24px) + ACABOX in IBM Plex Mono
     Medium, letter-spacing 0.1em, ink #141413, 9px gap, baseline-centered.
     The only sanctioned lockup — do not retype the wordmark in any other font. -->
<svg xmlns="http://www.w3.org/2000/svg" width="122" height="28" viewBox="0 0 122 28">
  <g transform="translate(2 2) scale(0.1875)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="#0645b1"></rect>
    <path d="M36 34 h54 v22 l-18 8 18 8 v22 h-54 z" fill="none" stroke="#ffffff" stroke-width="11" stroke-linejoin="round" stroke-linecap="round"></path>
  </g>
  <text x="35" y="20.5" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" font-weight="500" font-size="19" letter-spacing="1.9" fill="#141413">ACABOX</text>
</svg>
