<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Upload</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        #selectedPath {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Select Folder to Upload</h1>
    <button id="selectFolder">Choose Folder</button>
    <div id="selectedPath"></div>
    <h1>Uploaded Files</h1>
    <div id="uploadedFiles"></div>
    <hr>
    <h1>Title Search</h1>
    <input type="text" id="searchInput" placeholder="Search by title">
    <button id="searchButton">Search</button>
    <div id="searchResults"></div>

    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById('selectFolder').addEventListener('click', async () => {
            const folderPath = await ipcRenderer.invoke('select-folder');
            if (folderPath) {
                document.getElementById('selectedPath').textContent = `Selected folder: ${folderPath}`;
                await ipcRenderer.invoke('upload-files', folderPath);
            }
        });

        document.getElementById('searchButton').addEventListener('click', async () => {
            const searchTerm = document.getElementById('searchInput').value;
            const results = await ipcRenderer.invoke('search-files', searchTerm);
            document.getElementById('searchResults').textContent = `Search results: ${JSON.stringify(results)}`;
        });
    </script>
</body>
</html>
