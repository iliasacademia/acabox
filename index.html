<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Upload</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        #selectedPath {
            margin-top: 20px;
        }

        #uploadedFiles {
            display: none;
        }

        #searchResults {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Select Folder to Upload</h1>
    <button id="selectFolder">Choose Folder</button>
    <div id="selectedPath"></div>
    <div id="uploadedFiles">
        <h1>Uploaded Files</h1>
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>File</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="uploadedFilesBody">
            </tbody>
        </table>
    </div>
    <hr>
    <h1>Title Search</h1>
    <input type="text" id="searchInput" placeholder="Search by title">
    <button id="searchButton">Search</button>
    <div id="searchResults">
        <h1>Results</h1>
        <table>
            <thead>
                <tr>
                    <th>id</th>
                    <th>Title</th>
                    <th>File</th>
                </tr>
            </thead>
            <tbody id="searchResultsBody">
            </tbody>
        </table>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        // jQuery wants to override these, so rename require and remove the rest
        window.nodeRequire = require;
        delete window.require;
        delete window.exports;
        delete window.module;
    </script>
    <!-- TODO: Package jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $('#selectFolder').on('click', async () => {
            const folderPath = await ipcRenderer.invoke('select-folder');
            if (folderPath) {
                $('#selectedPath').text(`Selected folder: ${folderPath}`);
                await ipcRenderer.invoke('upload-files', folderPath);
            }
        });

        $('#searchButton').on('click', async () => {
            const searchTerm = $('#searchInput').val();
            const results = await ipcRenderer.invoke('search-files', searchTerm);
            const sr = $('#searchResults');
            sr.text(`Search results: ${JSON.stringify(results)}`);
            sr.show();
        });
    </script>
</body>
</html>
